version: "3.9"

services:
  gateway:
    build: ./gateway
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    environment:
      APP_ENV: development
      APP_NAME: Platform Core
      DATABASE_URL: postgresql+psycopg2://platform:platform@postgres:5432/platform
      SECRET_KEY: change-me-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
    depends_on:
      - postgres
      - redis
      - minio
      - qdrant
      - flowise
    ports:
      - "8000:8000"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    ports:
      - "5432:5432"

  redis:
    image: redis:7

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"

  flowise:
    image: flowiseai/flowise
    ports:
      - "3000:3000"
